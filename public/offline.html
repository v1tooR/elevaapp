<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#A14F2A" />
    <meta name="color-scheme" content="light" />
    <title>Sem conexão | Eleva App</title>
    <style>
      * { box-sizing: border-box; }
      html { min-height: 100%; background: #f8f5f2; }
      body {
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
        color: #1e1a17;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(100%, 420px);
        padding: 32px;
        text-align: center;
        background: #fff;
        border: 1px solid #e2d9d1;
        border-radius: 20px;
        box-shadow: 0 18px 48px rgba(30, 26, 23, 0.1);
      }
      img { width: 88px; height: 88px; border-radius: 20px; }
      h1 { margin: 24px 0 8px; font-size: 1.55rem; line-height: 1.2; }
      p { margin: 0; color: #6f625a; line-height: 1.6; }
      button {
        margin-top: 24px;
        padding: 12px 18px;
        border: 0;
        border-radius: 12px;
        background: #a14f2a;
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      button:focus-visible { outline: 3px solid #c97a52; outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="" width="88" height="88" />
      <h1>Você está sem conexão</h1>
      <p>O Eleva precisa de internet para acessar seus dados com segurança. Reconecte-se e tente novamente.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
    <script>
      window.addEventListener('online', function () { window.location.reload() })
    </script>
  </body>
</html>
